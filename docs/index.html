<!DOCTYPE html>
<html>
  <head>
    <title>Pond Mobile API reference</title>

    <!-- needed for adaptive design -->
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700" rel="stylesheet">

    <!--
    ReDoc doesn't change outer page styles
    -->
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      .header-bar {
        background: #1a202c;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
      }
      .header-bar a {
        color: #fff;
        text-decoration: none;
        font-size: 14px;
        font-weight: 400;
        font-family: Montserrat, Roboto, sans-serif;
        padding: 8px 16px;
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 4px;
        transition: all 0.3s ease;
      }
      .header-bar a:hover {
        background: rgba(255,255,255,0.1);
        border-color: rgba(255,255,255,0.4);
      }
    </style>
  </head>
  <body>
  	<div class="header-bar">
  		<div>
  			<a href="dist.json" download>Download OpenAPI</a>
  			<a href="CHANGELOG.md">View Changelog</a>
  		</div>
  	</div>
  	<div id="redoc-container"></div>
  	<script src="https://cdn.jsdelivr.net/npm/redoc@next/bundles/redoc.standalone.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/redoc-try-it-out/dist/try-it-out.min.js"></script>
		<script>
			// Debug: Check if RedocTryItOut is loaded
			console.log("RedocTryItOut:", typeof RedocTryItOut);

			RedocTryItOut.init(
        		"dist.json",
        		{
        			title: "Pond Mobile API reference",
        			tryItOutEnabled: true,
        			authBtnText: "Authorize for using TRY OUT feature"
        		},
        		document.getElementById("redoc-container")
		)
  	</script>
</body>
</html>
