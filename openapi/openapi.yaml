webhooks:
  ESIMStatusChangeEvent:
    post:
      tags:
        - Webhooks
      summary: ESIM Status Change Event
      description: |
        This webhook event is also called the "HandleDownloadProgressInfo" function in the GSMA RSP Technical Specs. The function SHALL be used by the SM-DP+ to notify the Operator of the progress of a pending Profile download order request. This function MAY be used at several points of the Profile Download and Installation procedure. It is assumed that the ICCID and the EID are enough to identify the pending Profile download order request at the SM-DP+ and the Operator sides. It is also assumed that the ICCID is enough for the SM-DP+ to retrieve the Operator to notify. For more technical details, please refer to the GSM Association Official Document SGP.22 – RSP Technical Specification v2.4 (SGP.22-2.4).

        Add-on Webhook Access

        This webhook belongs to our exclusive range of add-on services, designed to provide a more comprehensive API experience. To access this service, kindly reach out to your respective account manager.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - header
              properties:
                header:
                  type: object
                  required:
                    - functionRequesterIdentifier
                    - functionCallIdentifier
                    - iccid
                    - profileType
                    - timestamp
                    - notificationPointId
                    - notificationPointStatus
                  properties:
                    functionRequesterIdentifier:
                      type: string
                      description: Identification of the function requester.
                    functionCallIdentifier:
                      type: string
                      description: Identification of the function call.
                    eid:
                      type: string
                      description: Identifies the targeted eUICC. This information SHALL be set if available to the SM-DP+. EID as described in SGP.22-2.4 section 4.3.1.
                    iccid:
                      type: string
                      description: Identifies the Profile to download and install in the eUICC. ICCID as described in SGP.22-2.4 section 5.2.1.
                    profileType:
                      type: string
                      description: Identifies the Profile Type to download and install in the eUICC. Content free information defined by the Operator.
                    timestamp:
                      type: string
                      description: "Indicates the date/time when the operation has been performed. String format as specified by W3C: YYYY-MM-DDThh:mm:ssTZD (E.g. 2001-12-17T09:30:47Z)."
                    notificationPointId:
                      type: string
                      description: |
                        Indicates the step reached within the Profile Download and Installation procedure. Defined check points are:
                        - '1' -> Returned in case of failure due to insufficient download retries.
                        - '2' -> Returned when the maximum number of retries for the Confirmation Code has been exceeded.
                        - '3' -> BPP Downloaded (This notification indicates that the Binary Profile Package (BPP) has been successfully downloaded to the device. The BPP contains the eSIM profile data, including keys and configuration required for the proper functionality of the profile. At this point, the profile has been received, but installation has not yet occurred).
                        - '4' -> BPP Installation (This checkpoint confirms that the Binary Profile Package has been successfully installed on the eUICC (embedded Universal Integrated Circuit Card). Installation involves configuring the eSIM profile on the card so it can be used for network access. Any issues during installation will prevent the profile from being activated for use).
                        - '6' -> Local Enable (After the profile has been installed, this notification indicates that the profile has been locally enabled on the device. The profile is now active and can be used to connect to the network. Local enabling ensures that the profile is the one being used by the device, as there may be multiple profiles stored on the eUICC).
                        - '7' -> Local Disable (This notification shows that the profile has been locally disabled on the device. Disabling a profile prevents it from being used to connect to the network, though the profile still remains installed on the device. This could be useful in scenarios where multiple profiles exist, and only one should be active at a time).
                        - '8' -> Local Delete (This notification indicates that the profile has been locally deleted from the eUICC. Once deleted, the profile is no longer available on the device, and it cannot be used for network access. This step is typically irreversible, meaning the profile would need to be re-downloaded if required again in the future).
                    notificationPointStatus:
                      type: object
                      description: Indicates the status after the execution of the notification point. The ExecutionStatus type is re-used to specify the result of processing of the operation related to the notification point (Executed-Success, Executed-WithWarning, Failed), and optionally to provide information on any encountered problem (status code, data/object that causes the status code, and message to provide textual and human readable explanation of the status code).
                      required:
                        - status
                      properties:
                        status:
                          type: string
                          enum:
                            - Executed-Success
                            - Executed-WithWarning
                            - Failed
                            - Expired
                          description: Executed-Success, Executed-WithWarning, Failed or Expired.
                        statusCodeData:
                          type: object
                          nullable: true
                          description: This object could be null, depending on the status value.
                          properties:
                            subjectCode:
                              type: string
                              description: OID of the subject code.
                            reasonCode:
                              type: string
                              description: OID of the reason code.
                            subjectIdentifier:
                              type: string
                              description: Identifier of the subject.
                            messsage:
                              type: string
                              description: Textual and human readable explanation.
                            resultData:
                              type: string
                              description: Base64 encoded binary data containing the Result data contained in the ProfileInstallationResult. The finalResult data object as contained in the ProfileInstallationResult, when received from the eUICC.
      responses:
        "200":
          description: OK. The client endpoint must respond with an HTTP status code of 200 OK to acknowledge the successful delivery of the event. This response code indicates that the client has received and processed the webhook payload successfully.
components:
  securitySchemes:
    bearer:
      type: apiKey
      description: API uses a token-based authentication over HTTPS. A specific HTTP header with the bearer token must be added to any API request. To acquire a bearer token, please speak with your account manager.
      name: Authorization
      in: header
  schemas:
    Company:
      type: object
      properties:
        id:
          description: The unique identifier of the sub-company.
          type: integer
        name:
          description: The name of the sub-company.
          type: string
        note:
          description: A note or additional information associated with the sub-company.
          type: string
        parent_company:
          description: The unique identifier of the parent company to which the sub-company belongs. This field indicates the relationship between the sub-company and its parent company.
          type: integer
        email:
          description: The email address associated with the sub-company.
          type: string
        created_date:
          description: The date and time when the sub-company was created, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        status:
          description: The current status of the sub-company.
          type: string
          enum:
            - ACTIVE
            - TERMINATED
        deactivated_date:
          description: The date and time when the sub-company was deactivated, expressed as a Unix timestamp in milliseconds. If the sub-company is currently active, this field will be null.
          type: integer
          format: int64
    Country:
      type: object
      properties:
        name:
          description: The name of the country, represented as a string.
          type: string
        iso2:
          description: The ISO 2-letter code of the country, represented as a string.
          type: string
        iso3:
          description: The ISO 3-letter code of the country, represented as a string.
          type: string
    Inventory:
      type: object
      properties:
        id:
          description: The unique identifier of the inventory, represented as an integer.
          type: integer
        name:
          description: The name of the inventory, represented as a string.
          type: string
        note:
          description: A note or additional information associated with the inventory.
          type: string
        created_date:
          description: The date and time when the inventory was created, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        modified_date:
          description: The date and time when the inventory was last modified, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        deleted_date:
          description: The date and time when the inventory was created, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        company:
          description: The identifier of the associated company, represented as an integer.
          type: integer
        parent_inventory:
          description: The identifier of the parent inventory, if applicable, represented as an integer.
          type: integer
        status:
          description: The current status of the inventory, such as "NOT_ACTIVE".
          type: string
          enum:
            - NOT_ACTIVE
            - ACTIVE
            - TERMINATED
        deactivated_date:
          description: The date and time when the inventory was deactivated, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        wallet:
          description: The automatically created and attached wallet for the inventory, which represents the account balance of the company for the inventory. This field is only applicable to Cronus Cloud Network (CCN) customers. The wallet serves as a financial account associated with the inventory, and it tracks the balance of funds available for use by the company. All activities that generate charges, such as SIM usage and services, will count towards this wallet. The wallet balance indicates the available funds that can be used to cover the charges incurred by the company's inventory.
          type: integer
        whitelist:
          description: When an inventory is generated using a template, it automatically applies a network access configuration. This configuration establishes an initial whitelist that can only be modified by the creator. Admins of the Lv3 accounts are limited to viewing the whitelist or assigning it to a SIM within the corresponding inventory. If available, the whitelist ID is returned in this field.
          type: integer
    Group:
      type: object
      properties:
        id:
          description: The unique identifier of the group, represented as an integer.
          type: integer
        name:
          description: The name of the group, represented as a string.
          type: string
        inventory:
          description: An object representing the associated inventory of the group.
          type: object
          properties:
            name:
              description: The name of the inventory.
              type: string
            id:
              description: The identifier of the inventory.
              type: integer
        company:
          description: An object representing the associated company of the group.
          type: object
          properties:
            name:
              description: The name of the company.
              type: string
            id:
              description: The identifier of the company.
              type: integer
        created_date:
          description: The date and time when the group was created, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        modified_date:
          description: The date and time when the group was last modified, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        count_sims:
          description: The number of SIM cards contained within the group.
          type: integer
        wallet:
          description: The automatically created and attached wallet for the group. This wallet is associated with the group and can hold a balance that can be used for various purposes. The wallet allows for setting an overdraft limit, which enables the balance to go below zero up to the specified limit.  The SIMs within the group can charge their usage towards their own individual wallets or towards this group's wallet. This configuration is determined by the "Wallet Mode" setting in the SIM's Policy and Charging Rules (PCR) profile.  The wallet provides flexibility in managing and distributing funds within the group. It can be used to achieve a pooled balance where the usage charges of all SIMs in the group contribute to and draw from a shared balance.
          type: integer
        type:
          description: "The type of the group. Possible values are: CLASSIC, UNIVERSAL_DATA_ONLY, UNIVERSAL_VOICE."
          type: string
          enum:
            - CLASSIC
            - UNIVERSAL_DATA_ONLY
            - UNIVERSAL_VOICE
    IMSI:
      type: object
      properties:
        sponsor_id:
          description: The identifier of the IMSI sponsor.
          type: integer
        imsi:
          description: The IMSI.
          type: integer
          format: int64
    SIM:
      type: object
      properties:
        iccid:
          description: The ICCID (Integrated Circuit Card Identifier) of the SIM card.
          type: string
        sim_status:
          description: "The status of the SIM card. Possible values are: WAITING_FOR_ASSIGNMENT, PRE_SERVICE, IN_SERVICE, TERMINATED."
          type: string
          enum:
            - WAITING_FOR_ASSIGNMENT
            - PRE_SERVICE
            - IN_SERVICE
            - TERMINATED
        sim_type:
          description: "Represents type of the SIM card. Possible values are: eSIM, SIM."
          type: string
          enum:
            - eSIM
            - SIM
        sim_variance:
          description: "Represents variance of the SIM card. Possible values are: UNIVERSAL_DATA_ONLY, UNIVERSAL_VOICE, CLASSIC."
          type: string
          enum:
            - UNIVERSAL_DATA_ONLY
            - UNIVERSAL_VOICE
            - CLASSIC
        group:
          description: The identifier of the associated group.
          type: integer
        inventory:
          description: The identifier of the associated inventory.
          type: integer
        company:
          description: The identifier of the associated company.
          type: integer
        created_date:
          description: The date and time when the SIM was created, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        modified_date:
          description: The date and time when the SIM was last modified, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        removed_date:
          description: The date and time when the SIM was removed, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        imsis:
          description: An array containing the list of IMSIs (International Mobile Subscriber Identities) associated with the SIM card.
          type: array
          items:
            $ref: "#/components/schemas/IMSI"
        mapped_imsi:
          description: The identifier of the mapped IMSI (internal), if applicable.
          type: integer
          format: int64
    SIM_transfer:
      type: object
      properties:
        id:
          description: The identifier of the SIM transfer.
          type: string
        number_of_sims:
          description: The number of SIM cards involved in the transfer.
          type: integer
        created_date:
          description: The date and time when the transfer was created, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        completed_date:
          description: The date and time when the transfer was completed, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        created_by:
          description: The entity or user who initiated the transfer.
          type: string
        status:
          description: "The status of the transfer. Possible values are: FAILED, SUCCESS, IN_PROGRESS, PENDING."
          type: string
          enum:
            - FAILED
            - SUCCESS
            - IN_PROGRESS
            - PENDING
        source_inventory:
          description: An object representing the source inventory from which the SIM cards are transferred.
          type: object
          properties:
            name:
              description: The name of the inventory.
              type: string
            id:
              description: The identifier of the inventory.
              type: integer
        dest_inventory:
          description: An object representing the target inventory to which the SIM cards are transferred.
          type: object
          properties:
            name:
              description: The name of the inventory.
              type: string
            id:
              description: The identifier of the inventory.
              type: integer
    SIM_transfer_report:
      type: object
      properties:
        iccid:
          description: The ICCID (Integrated Circuit Card Identifier) of the SIM card.
          type: string
        status:
          description: "The status of the transfer request for the SIM card. Possible values are: FAILED, SUCCESS, IN_PROGRESS, PENDING."
          type: string
          enum:
            - FAILED
            - SUCCESS
            - IN_PROGRESS
            - PENDING
        completed_date:
          description: The date and time when the transfer was completed, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        failure_code:
          description: An optional failure code indicating the reason for the transfer failure (if applicable).
          type: integer
        failure_message:
          description: An optional message providing additional details about the transfer failure (if applicable).
          type: string
    SIM_Detail:
      type: object
      properties:
        iccid:
          description: The ICCID (Integrated Circuit Card Identifier) of the SIM card.
          type: string
        sim_status:
          description: "Represents the current status of the SIM card. Possible values are: WAITING_FOR_ASSIGNMENT, PRE_SERVICE, IN_SERVICE, TERMINATED."
          type: string
          enum:
            - WAITING_FOR_ASSIGNMENT
            - PRE_SERVICE
            - IN_SERVICE
            - TERMINATED
        group:
          description: An object representing the associated group.
          type: object
          properties:
            id:
              description: The identifier of the group.
              type: integer
            name:
              description: The name of the group.
              type: string
        inventory:
          description: An object representing the associated inventory.
          type: object
          properties:
            id:
              description: The identifier of the inventory.
              type: integer
            name:
              description: The name of the inventory.
              type: string
        company:
          description: An object representing the associated company.
          type: object
          properties:
            id:
              description: The identifier of the company.
              type: integer
            name:
              description: The name of the company.
              type: string
        provisioned_date:
          description: The date when the SIM card was provisioned, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        terminated_date:
          description: The date when the SIM card was terminated, if applicable, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        imsis:
          description: An array containing the list of IMSIs (International Mobile Subscriber Identities) associated with the SIM card.
          type: array
          items:
            $ref: "#/components/schemas/IMSI"
        mapped_imsi:
          description: The identifier of the mapped IMSI (internal), if applicable.
          type: integer
          format: int64
    Assignment:
      type: object
      properties:
        sim:
          description: The identifier of the SIM.
          type: string
        assigned_date:
          description: The date of MSISDN has been assigned.
          type: integer
          format: int64
        assignment_id:
          description: The identifier of MSISDN's assignment.
          type: integer
          format: int64
    MSISDN:
      type: object
      properties:
        msisdn:
          description: The identifier of the MSISDN.
          type: integer
        country_code:
          description: The country code.
          type: integer
        iso3:
          description: ISO3 code of the country.
          type: string
        date_added:
          description: The date of MSISDN has been added.
          type: integer
        inventory:
          description: Identifier of the inventory.
          type: integer
        isCli:
          description: Is CLI presented on the MSISDN.
          type: boolean
        status:
          description: The status of the MSISDN.
          type: string
          enum:
            - ASSIGNED
            - UNASSIGNED
        current_assignment:
          type: object
          properties:
            sim:
              description: The identifier of the SIM.
              type: string
            assigned_date:
              description: The date of MSISDN has been assigned.
              type: integer
              format: int64
            assignment_id:
              description: The identifier of MSISDN's assignment.
              type: integer
              format: int64
    EUICC_profile:
      type: object
      required:
        - iccid
        - imsi
        - state
        - last_operation_date
        - activation_code
        - reuse_remaining_count
        - reuse_enabled
        - profile_reuse_policy
        - release_date
        - cc_required
      properties:
        iccid:
          description: Profile ICCID.
          type: string
        imsi:
          description: Profile IMSI.
          type: string
        state:
          description: "The ESIM Profile States. AVAILABLE: The Profile is available in the inventory of the SM-DP+. ALLOCATED: The Profile is reserved for downloading without being linked to an EID. LINKED: The Profile is reserved for downloading and is linked to an EID. CONFIRMED: The Profile is reserved for downloading (linked or not linked to an EID) with Matching ID and Confirmation Code if required. RELEASED: The Profile is ready for download and installation after Network Configuration by the Operator. DOWNLOADED: The Bound Profile was delivered to the LPA. INSTALLED: The Profile was successfully installed on the eUICC. ENABLED: The last Notification received from the eUICC was an enable Notification. DISABLED: The last Notification received from the eUICC was a disable Notification. ERROR: The Profile has not been installed because of an error case. UNAVAILABLE: The Profile cannot be reused anymore by the SM-DP+. DELETED: The last Notification received from the eUICC was a delete Notification."
          type: string
          enum:
            - AVAILABLE
            - ALLOCATED
            - LINKED
            - CONFIRMED
            - RELEASED
            - DOWNLOADED
            - INSTALLED
            - ENABLED
            - DISABLED
            - ERROR
            - UNAVAILABLE
            - DELETED
        last_operation_date:
          description: The date/time of last audit trail record for this profile. It represents the absolute time, measured in milliseconds, elapsed since the epoch (January 1, 1970 00:00:00 UTC).
          type: integer
          format: int64
        activation_code:
          description: Activation code that will be used in QR-code generation.
          type: string
        reuse_remaining_count:
          description: Number of remaining Profile reuses. If the value equals to -1, the Profile reuse is not limited by reuse count.
          type: integer
          minimum: -1
        reuse_enabled:
          description: If set 'true', the Profile may be reused in accordance with the Profile Reuse Policy. If set 'false', the Profile can not be reused.
          type: boolean
        profile_reuse_policy:
          description: Policy used for all Profiles in the Profile Type that specifies state of profile after deletion. If Profile Reuse Policy is disabled (prp equals NEVER), the other values are ignored. By default the Profile Reuse Policy is disabled.
          type: object
          required:
            - reuse_type
            - max_count
          properties:
            reuse_type:
              description: "Profile Reuse Policy that specifies the condition under which profile can be reused. NEVER: Profile reuse is disabled. SAME_EID_MID: Profile can be reused with same EID and MID. SAME_MID: Profile can be reused with same MID. NEW_EID_MID: Profile can be reused with new EID and MID."
              type: string
              enum:
                - NEVER
                - SAME_EID_MID
                - SAME_MID
                - NEW_EID_MID
            max_count:
              description: The number of maximal reuses. The value should be a nonnegative integer. If the value is set to -1, the Profile reuse is unlimited by count.
              type: integer
              minimum: -1
        release_date:
          description: Timestamp (in epoch millis) containing the date when profile was released.
          type: integer
          format: int64
        cc_required:
          description: Indicate that Confirmation Code is required for profile downloading.
          type: boolean
        cc_retries:
          description: Number of Confirmation Code attempts left.
          type: integer
        eid:
          description: The EID (eSIM Identifier) is the unique ID assigned to a device for eSIM activation. It remains empty until the eSIM is successfully activated, at which point the EID becomes available.
          type: string
    Package_template:
      type: object
      properties:
        id:
          description: The unique identifier of the package template.
          type: integer
        name:
          description: The name of the package template.
          type: string
        traffic_policy:
          description: The ID of the traffic policy applied to the package template.
          type: integer
        supported_countries:
          description: An array of country codes (ISO-3 Format) where the package can be used.
          type: array
          items:
            type: string
        voice_usage_allowance:
          description: The allowed amount of voice usage in the package. The value for this field is in minute.
          type: integer
        data_usage_allowance:
          description: The allowed amount of data usage in the package. The value for this field is in byte.
          type: integer
        sms_usage_allowance:
          description: The allowed amount of SMS usage in the package. The value for this field is in message.
          type: integer
        activation_time_allowance:
          description: The time duration within which the package can be activated after its creation. The value for this field is in second.
          type: integer
        activation_type:
          description: It specifies how a package template is activated. It can be either "Auto" or "Manual." The "Auto" activation type, an improved version of the former (v1 version) LU or PDP event-based activation, allows for automatic activation when a valid connection is established. On the other hand, "Manual" activation requires a request, such as an API call, to activate the package. Packages with "Auto" activation can also be manually activated using API requests when necessary.
          type: string
          enum:
            - AUTO
            - MANUAL
        earliest_activation_date:
          description: This field indicates the earliest time, expressed as a Unix timestamp (In millisecond), at which the package template can be made available for purchase. Packages can only be added to a SIM within this specified timeframe.
          type: integer
          format: int64
        earliest_available_date:
          description: This field indicates the earliest time, expressed as a Unix timestamp (In millisecond), at which the package template can be made available for purchase. Packages can only be added to a SIM within this specified timeframe.
          type: integer
          format: int64
        latest_available_date:
          description: This field specifies the latest time, expressed as a Unix timestamp (In millisecond), at which the package template can be available for purchase. Beyond this time, the package cannot be added to a SIM.
          type: integer
          format: int64
        notes:
          description: Additional information or notes about the package template.
          type: string
        created_date:
          description: The date when the package template was created, expressed as a Unix timestamp (In millisecond).
          type: integer
          format: int64
        modified_date:
          description: The date when the package template was last modified, expressed as a Unix timestamp (In millisecond).
          type: integer
          format: int64
        time_allowance:
          description: An object specifying the duration and unit (e.g., "CALENDAR_MONTH") of the package's validity.
          type: object
          properties:
            duration:
              description: The duration of the package's validity.
              type: integer
              format: int64
            unit:
              description: The unit of the package's validity, such as "CALENDAR_MONTH", "SECOND".
              type: string
              enum:
                - CALENDAR_MONTH
                - SECOND
        status:
          description: This field indicates the current status of the package template, such as 'ACTIVE'.
          type: string
          enum:
            - ACTIVE
            - TERMINATED
        deactivated_date:
          description: The date when the package template was deactivated, expressed as a Unix timestamp (In millisecond). It will be 0 if the template is active or has never been deactivated.
          type: integer
          format: int64
        apn:
          description: This field indicates the Access Point Name (APN) associated with the package template.
          type: string
    Package:
      type: object
      properties:
        id:
          description: The unique identifier of the package.
          type: string
        sim:
          description: The identifier of the SIM associated with the package.
          type: string
        created_date:
          description: The date when the package was created, expressed as a Unix timestamp (in millisecond).
          type: integer
          format: int64
        expiry_date:
          description: The date when the package will expiry, expressed as a Unix timestamp (in millisecond).
          type: integer
          format: int64
        activated_date:
          description: The date when the package was activated, expressed as a Unix timestamp (in millisecond).
          type: integer
          format: int64
        terminated_date:
          description: The date when the package was terminated, expressed as a Unix timestamp (in millisecond).
          type: integer
          format: int64
        window_activation_start:
          description: The start date and time of the activation window for the package, expressed as a Unix timestamp in milliseconds. The package can only be activated within this specified timeframe.
          type: integer
          format: int64
        window_activation_end:
          description: The end date and time of the activation window for the package, expressed as a Unix timestamp in milliseconds. The package can only be activated within this specified timeframe.
          type: integer
          format: int64
        status:
          description: The current status of the package. After creation, the default status of a package is "NOT_ACTIVE". This indicates that the package is initially inactive and needs to be activated before it can be used. The method of activation is determined by the "ACTIVATION_TYPE" field in the associated package template used to create the SIM package. The package template specifies the activation method, such as "API", which indicates that the package can be activated programmatically via an API call.
          type: string
          enum:
            - NOT_ACTIVE
            - ACTIVE
            - TERMINATED
        voice_usage_remaining:
          description: The remaining allowed amount of voice usage in the package. The value for this field is in minutes.
          type: integer
        data_usage_remaining:
          description: The remaining allowed amount of data usage in the package. The value for this field is in bytes.
          type: integer
          format: int64
        sms_usage_remaining:
          description: The remaining allowed amount of SMS usage in the package. The value for this field is in messages.
          type: integer
        time_allowance:
          description: The initial total time allowance for the package. The value for this field is in second.
          type: integer
        package_template:
          description: An object containing information about the package template used to create the package.
          type: object
          properties:
            id:
              description: The unique identifier of the package template.
              type: integer
            name:
              description: The name of the package template.
              type: string
            voice_usage_allowance:
              description: The initial total allowance of voice usage given to the package. The value for this field is in minutes.
              type: integer
            data_usage_allowance:
              description: The initial total allowance of data usage given to the package. The value for this field is in bytes.
              type: integer
              format: int64
            sms_usage_allowance:
              description: The initial total allowance of SMS usage given to the package. The value for this field is in messages.
              type: integer
            time_allowance:
              description: An object specifying the duration and unit of the package template's validity.
              type: object
              properties:
                duration:
                  description: The duration of the package's validity.
                  type: integer
                  format: int64
                unit:
                  description: The unit of the package's validity, such as "CALENDAR_MONTH", "SECOND".
                  type: string
                  enum:
                    - CALENDAR_MONTH
                    - SECOND
            activation_time_allowance:
              description: The time duration within which the package associated with the template can be activated after its creation. The value for this field is in seconds.
              type: integer
    Wallet:
      type: object
      required:
        - id
        - wallet_type
        - owner
        - balance
        - overdraft
      properties:
        id:
          description: The unique wallet id.
          type: integer
        wallet_type:
          description: The type indicates which type of entity the wallet is associated with. For example, GROUP type means that it is the wallet attached to a group (group of SIMs).
          type: string
          enum:
            - INVENTORY
            - GROUP
            - SIM
        owner:
          description: The owner indicates the originating source of funds for a wallet's balance or overdraft. The 'wallet owner' in this context refers to the account linked to these funds. Each wallet must have one and only one owner (inventory, group or SIM).
          type: object
          properties:
            inventory:
              description: If not null, the owner is the specified inventory.
              type: integer
            group:
              description: If not null, the owner is the specified group.
              type: integer
            sim:
              description: If not null, the owner is the specified SIM. The field represents the ICCID of the SIM.
              type: string
        balance:
          description: The wallet balance displays the prepaid funds that can be used for all network services, including Data, SMS, and Voice. These services incur charges that are deducted from the wallet balance. If there's an established overdraft limit, the balance could potentially drop below zero. But remember, if the balance meets the overdraft limit, all network services will pause until the balance is restored. Pricing for these network services is predetermined in the rate sheets.
          type: number
        overdraft:
          description: The overdraft defines the overdraft threshold of a wallet. For example, 500 overdraft allows balance to reach -500 before service disruption. Please note that the value of the field must be 0 or greater.
          type: number
    PCR_profile:
      type: object
      properties:
        sim:
          description: The identifier of the SIM card associated with the PCR profile.
          type: string
        data:
          description: Information about the data service profile settings.
          type: object
          properties:
            state:
              description: The state of the data service profile, such as "ENABLED" or "DISABLED".
              type: string
            active_throttling:
              description: The active throttling configuration for the data service profile, such as "NO_LIMIT", "SPEED_100_KBPS", "SPEED_200_KBPS", "SPEED_300_KBPS", "SPEED_400_KBPS", "SPEED_500_KBPS", "SPEED_600_KBPS", "SPEED_700_KBPS", "SPEED_800_KBPS", "SPEED_900_KBPS", "SPEED_1000_KBPS", "SPEED_1100_KBPS", "SPEED_1200_KBPS", "SPEED_1300_KBPS", "SPEED_1400_KBPS", "SPEED_1500_KBPS", "SPEED_1600_KBPS", "SPEED_1700_KBPS", "SPEED_1800_KBPS", "SPEED_1900_KBPS", "SPEED_2000_KBPS", "SPEED_2100_KBPS", "SPEED_2200_KBPS", "SPEED_2300_KBPS", "SPEED_2400_KBPS", "SPEED_2500_KBPS", "SPEED_2600_KBPS", "SPEED_2700_KBPS", "SPEED_2800_KBPS", "SPEED_2900_KBPS", "SPEED_3000_KBPS", "SPEED_3100_KBPS", "SPEED_3200_KBPS", "SPEED_3300_KBPS", "SPEED_3400_KBPS", "SPEED_3500_KBPS", "SPEED_3600_KBPS", "SPEED_3700_KBPS", "SPEED_3800_KBPS", "SPEED_3900_KBPS", "SPEED_4000_KBPS", "SPEED_4100_KBPS", "SPEED_4200_KBPS", "SPEED_4300_KBPS", "SPEED_4400_KBPS", "SPEED_4500_KBPS", "SPEED_4600_KBPS", "SPEED_4700_KBPS", "SPEED_4800_KBPS", "SPEED_4900_KBPS" or "SPEED_5000_KBPS"
        voice:
          description: Information about the voice service profile settings.
          type: object
          properties:
            state:
              description: The state of the voice service profile, such as "ENABLED" or "DISABLED".
              type: string
        sms:
          description: Information about the sms service profile settings.
          type: object
          properties:
            state:
              description: The state of the sms service profile, such as "ENABLED" or "DISABLED".
              type: string
        wallet_mode:
          description: The mode of the wallet usage, which determines which wallet the SIM's usage will be charged towards, such as "GROUP" or "SIM". The value "GROUP" indicates that the SIM's usage will be charged towards the wallet associated with the group.
          type: string
        wallets:
          description: An array of wallets associated with the SIM card.
          type: array
          items:
            $ref: "#/components/schemas/Wallet"
        route_policy:
          description: The route policy determines how the signal is handled and terminated on the network layer. For more info, please consult your account manager.
          type: integer
    Route_policy:
      type: object
      properties:
        id:
          description: This is a unique identifier for each route policy. It allows you to distinguish one policy from another within the system.
          type: integer
        description:
          description: This field provides a summary of what each route policy does, specifically outlining how it affects singaling handling and termination on the network layer.
          type: string
    Traffic_policy:
      type: object
      properties:
        id:
          description: This field is the unique identifier assigned to each traffic policy. It helps differentiate this particular policy from others in the system.
          type: integer
        description:
          description: This field contains a concise summary of the traffic policy, outlining how it manages data throttling for the SIM card.
          type: string
    Iccid:
      type: object
      properties:
        iccid:
          description: The ICCID (Integrated Circuit Card Identifier) of the SIM, represented as a string.
          type: string
    Session:
      type: object
      properties:
        data_session_id:
          description: The identifier of the data session, represented as a string.
          type: string
        opened_date:
          description: The date and time when the data session was opened, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        mcc:
          description: The Mobile Country Code (MCC) associated with the data session, represented as a string.
          type: string
        mnc:
          description: The Mobile Network Code (MNC) associated with the data session, represented as a string.
          type: string
        sponsor_imsi:
          description: The sponsor IMSI (International Mobile Subscriber Identity) associated with the data session, represented as a string.
          type: string
        usage_kb:
          description: The amount of data usage for the data session, represented in kilobytes.
          type: integer
          format: int64
        rat:
          description: The Radio Access Technology (RAT) used for the data session, represented as an integer. 1 = UTRAN, 2 = GERAN, 3 = WAN, 4 = GAN, 5 = HSPA Evolution, 6 = EUTRAN (WB-E-UTRAN), 7 = Virtual, 8 = EUTRAN-NB-IoT, 9 = LTE-M, 10 = NR, 11-255 = spare. For details and updates, please refer to 3GPP TS 29.274.
          type: integer
        private_ip:
          description: The private IP address assigned to the data session, represented as a string.
          type: string
        charge_towards:
          description: The charging mechanism for the data session, such as "PACKAGE".
          type: string
          enum:
            - PACKAGE
            - BALANCE
        apn:
          description: This field indicates the Access Point Name (APN) associated with the data session.
          type: string
    Whitelist:
      type: object
      properties:
        id:
          description: The unique identifier of the whitelist, represented as an integer.
          type: integer
        name:
          description: The name of the whitelist, represented as a string.
          type: string
        company:
          description: The identifier of the associated company, represented as an integer.
          type: integer
        inventory:
          description: The identifier of the associated inventory, represented as an integer.
          type: integer
        created_date:
          description: The date when the whitelist was created, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        modified_date:
          description: The date when the whitelist was last modified, expressed as a Unix timestamp in milliseconds.
          type: integer
          format: int64
        type:
          description: "The type of the whitelist. Possible values are: CLASSIC, UNIVERSAL_DATA_ONLY, UNIVERSAL_VOICE."
          type: string
          enum:
            - CLASSIC
            - UNIVERSAL_DATA_ONLY
            - UNIVERSAL_VOICE
        parent_whitelist:
          description: The identifier of the parent whitelist, if applicable, represented as an integer. If a parent whitelist is specified, the number of available entries in the current whitelist is limited by the parent whitelist. This means that the parent whitelist defines the superset of networks available to the SIM.
          type: integer
    Header:
      type: object
      properties:
        header:
          type: string
        value:
          type: string
