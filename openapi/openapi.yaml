      description: The endpoint enables the transfer of SIM cards from one of the company's current inventories to a sub-company's inventory. It is only available to companies that have the sub-company module enabled. The transferred SIM cards can be assigned to a specific whitelist or group in the destination inventory, and the wallet mode for the transferred SIM cards can be specified.
