                  type: integer
                dest_inventory:
                  description: The identifier of the target inventory where the SIM cards will be transferred. This should be one of the company's existing inventories.
                  type: integer
                dest_whitelist:
                  description: The identifier of the whitelist in the destination inventory to which the transferred SIM cards will be assigned.
                  type: integer
                dest_group:
                  description: The identifier of the group in the destination inventory to which the transferred SIM cards will be assigned.
                  type: integer
                wallet_mode:
                  description: The wallet mode for the transferred SIM cards, such as "SIM".
                  type: string
                sims:
                  description: An object containing the SIM card details.
                  type: object
                  properties:
                    iccids:
