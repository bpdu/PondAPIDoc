    post:
      tags:
        - Inventory
      summary: Create a new inventory.
      operationId: addInventory
      description: The endpoint allows the creation of an inventory under a sub-company's account. Only companies that enable the sub-company management feature can create inventories for their sub-companies. An inventory represents a collection of SIMs and the available pre-defined configurations that can be attached to them.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  description: The name of the inventory.
                  type: string
                note:
                  description: A note or additional information associated with the inventory.
                  type: string
                company:
                  description: The identifier of the parent company of the created inventory, represented as an integer.
                  type: integer
                parent_inventory:
                  description: The identifier of the parent inventory, if applicable, represented as an integer.
                  type: integer
                display_currency:
                  description: The currency used for displaying monetary values in the inventory, represented as a string.
                  type: string
                template:
                  description: If provided, the inventory is going to be created and automatically activated based on the specification of the pre-defined template. To acquire a template ID, please speak with your account manager.
                  type: integer
      parameters:
        - name: request-id
          in: header
