    post:
      tags:
        - Policy and Charging Rules (PCR)
      summary: Create a new package template.
      operationId: createPackageTemplate
      description: The endpoint allows you to create a package template. A package template is a blueprint for creating SIM data, voice, or SMS plans, also known as packages. When creating a template, you can define several parameters including the service allowance, duration, sales and activation window, traffic policy to be applied, the template name, and the activation method. Once a template is established, you can use it to generate one or more packages for a SIM via other endpoints. The network services available to the SIM are defined by these packages.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  description: The name of the package template.
                  type: string
                traffic_policy:
                  description: The ID of the traffic policy applied to the package template.
                  type: integer
                supported_countries:
                  description: An array of country codes (ISO-3 Format) where the package can be used.
                  type: array
                  items:
                    type: string
                voice_usage_allowance:
                  description: The allowed amount of voice usage for the package template. The value of this field is in minutes.
                  type: integer
                data_usage_allowance:
                  description: The allowed amount of data usage for the package template. The value of this field is in bytes.
                  type: integer
                sms_usage_allowance:
                  description: The allowed amount of SMS usage for the package template. The value of this field is in messages.
                  type: integer
                activation_time_allowance:
                  description: The time duration within which the package associated with the template can be activated after its creation. The value for this field is in seconds.
                  type: integer
                activation_type:
                  description: It specifies how a package template is activated. It can be either "Auto" or "Manual." The "Auto" activation type, an improved version of the former (v1 version) LU or PDP event-based activation, allows for automatic activation when a valid connection is established. On the other hand, "Manual" activation requires a request, such as an API call, to activate the package. Packages with "Auto" activation can also be manually activated using API requests when necessary.
                  type: string
                  enum:
                    - AUTO
                    - MANUAL
                earliest_activation_date:
                  description: This field indicates the earliest time, expressed as a Unix timestamp (In millisecond), at which the package template can be made available for purchase. Packages can only be added to a SIM within this specified timeframe.
                  type: integer
                  format: int64
                earliest_available_date:
                  description: This field indicates the earliest time, expressed as a Unix timestamp (In millisecond), at which the package template can be made available for purchase. Packages can only be added to a SIM within this specified timeframe.
                  type: integer
                  format: int64
                latest_available_date:
                  description: This field specifies the latest time, expressed as a Unix timestamp (In millisecond), at which the package template can be available for purchase. Beyond this time, the package cannot be added to a SIM.
                  type: integer
                  format: int64
                notes:
                  description: Additional information or notes about the package template.
                  type: string
                time_allowance:
                  description: An object specifying the duration and unit (e.g., "CALENDAR_MONTH") of the package template's validity.
                  type: object
                  properties:
                    duration:
                      description: The duration of the package template's validity.
                      type: integer
                      format: int64
                    unit:
                      description: The unit of the package template's validity, such as "CALENDAR_MONTH", "SECOND".
                      type: string
                      enum:
                        - CALENDAR_MONTH
                        - SECOND
                inventory:
                  description: The inventory in which the package template is created. This parameter specifies the inventory to which the package template is associated. Only SIMs within the same inventory can be assigned a package using this package template.
                  type: integer
                apn:
                  description: Optional. If specified, the package behavior would only be applied to data sessions opened by the specified APN.
                  type: string

      parameters:
        - name: request-id
          in: header
          description: The parameter is returned in the response header. It functions as a reference ID to assist client-side developers, particularly when working with asynchronous systems. This unique identifier helps in tracking individual requests, aiding in troubleshooting and system monitoring.
          schema:
            type: string
        - name: version
          in: header
          description: If this header is not provided, or if an invalid version is given, the API will default to using the latest version available.
          schema:
            type: string
