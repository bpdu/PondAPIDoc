      summary: Assigns SIMs to the whitelist.
      operationId: updateWhitelist
      description: |
        This API assigns one or more SIMs to the whitelist.

        On success, the request will immediately update the database entry so that future registration of connection will have the new whitelist applied.

        If the request is sent during a live connection of the device (SIM):
        - If the new whitelist blocks the currently registered network, the data connection would drop during the subsequent quota request on the PGW side
        - The current tower connection is kept alive till the next location update happens. For example, on a mobile handset, the signal bars would remain till the reboot
        - Cancel location request can immediately remove the device from the network, including the tower connection

        If the device is offline at the time of the request, reconnection is controlled by the device logic (this API does not control the reconnection logic).
